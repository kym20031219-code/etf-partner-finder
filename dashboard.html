<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>눌림목 스윙 추천</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080c;--surface:#0d0f17;--card:#111420;--border:#1a1d2e;--border2:#22253a;
  --accent:#4f8ef7;--accent2:#7ba8ff;
  --green:#2dce89;--red:#f75f4f;--purple:#9b5cf6;--gold:#f5c542;--orange:#ff9f43;
  --text:#e8ecf5;--sub:#6b7290;--dim:#2a2d42;
}
body{background:var(--bg);color:var(--text);font-family:'Inter','Apple SD Gothic Neo','Malgun Gothic','Segoe UI',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}

/* HEADER */
.hdr{padding:24px 20px 18px;border-bottom:1px solid var(--border);background:linear-gradient(160deg,#0b0e19 0%,var(--bg) 100%);position:relative;overflow:hidden}
.hdr::after{content:'';position:absolute;top:-80px;right:-60px;width:300px;height:300px;background:radial-gradient(circle,rgba(79,142,247,.08) 0%,transparent 65%);pointer-events:none}
.hdr-row{display:flex;align-items:center;gap:11px;max-width:820px;margin:0 auto}
.logo{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hdr h1{font-size:19px;font-weight:800;letter-spacing:-.3px}
.hdr h1 small{display:block;font-size:11px;font-weight:500;color:var(--sub);margin-top:2px;letter-spacing:0}

/* META BAR */
.meta{max-width:820px;margin:14px auto 0;display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:0 20px}
.badge{display:inline-flex;align-items:center;gap:6px;border-radius:7px;padding:4px 11px;font-size:11.5px;font-weight:600}
.badge.live{background:rgba(45,206,137,.1);border:1px solid rgba(45,206,137,.22);color:var(--green)}
.badge.info{background:rgba(79,142,247,.08);border:1px solid rgba(79,142,247,.18);color:var(--accent2)}
.badge .dot{width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor}
.refresh{margin-left:auto;background:var(--card);border:1px solid var(--border2);color:var(--sub);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:border-color .2s,color .2s}
.refresh:hover{border-color:var(--accent);color:var(--accent2)}
.refresh:active{transform:scale(.97)}

/* MAIN */
.main{max-width:820px;margin:0 auto;padding:20px}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:18px 18px 16px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green),var(--accent))}
.card:hover{transform:translateY(-2px);border-color:var(--border2)}
.c-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:2px}
.c-name{font-size:16px;font-weight:800;letter-spacing:-.2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c-code{font-size:11px;font-weight:700;font-family:'Courier New',monospace;color:var(--sub);flex-shrink:0}
.c-price{display:flex;align-items:baseline;gap:8px;margin:10px 0 14px}
.c-close{font-size:24px;font-weight:900;line-height:1}
.c-rsi{font-size:11px;color:var(--sub);background:var(--border);border-radius:5px;padding:3px 8px;font-weight:700}
.c-levels{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lvl{border-radius:8px;padding:8px 10px;background:var(--surface);border:1px solid var(--border)}
.lvl-lbl{font-size:9.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--sub);margin-bottom:3px}
.lvl-val{font-size:14px;font-weight:800;line-height:1}
.lvl-pct{font-size:10.5px;font-weight:700;margin-top:2px}
.lvl.target .lvl-val{color:var(--green)}.lvl.target .lvl-pct{color:var(--green)}
.lvl.stop .lvl-val{color:var(--red)}.lvl.stop .lvl-pct{color:var(--red)}

/* SECTION HEADERS + WATCH VARIANT */
.section{margin-bottom:26px}
.sec-head{display:flex;align-items:center;gap:8px;margin:2px 0 12px}
.sec-head h2{font-size:15px;font-weight:800;letter-spacing:-.2px}
.sec-head .n{font-size:12px;font-weight:700;color:var(--sub);background:var(--border);border-radius:999px;padding:2px 9px}
.sec-head .hint{margin-left:auto;font-size:11px;color:var(--sub)}
.card.buy::before{background:linear-gradient(var(--green),var(--accent))}
.card.watch::before{background:linear-gradient(var(--gold),var(--orange))}
.c-dist{font-size:11px;color:var(--sub);background:var(--border);border-radius:5px;padding:3px 8px;font-weight:700}
.sec-empty{font-size:12.5px;color:var(--sub);background:var(--card);border:1px dashed var(--border2);border-radius:12px;padding:16px 18px}

/* EMPTY / LOADING / ERROR */
.state-box{text-align:center;padding:60px 24px;color:var(--sub)}
.state-box .emoji{font-size:44px;margin-bottom:14px;opacity:.85}
.state-box h2{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.state-box p{font-size:13px;line-height:1.6;max-width:360px;margin:0 auto}
.spinner{width:34px;height:34px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* DISCLAIMER */
.foot{max-width:820px;margin:8px auto 40px;padding:16px 20px}
.disc{background:rgba(247,95,79,.05);border:1px solid rgba(247,95,79,.16);border-radius:10px;padding:12px 15px;font-size:12px;line-height:1.6;color:var(--sub)}
.disc b{color:#f7a99f}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-row">
    <div class="logo">📈</div>
    <h1>눌림목 스윙 추천<small>상승추세 종목이 20일선까지 눌렸다 반등하는 자리</small></h1>
  </div>
</header>

<div class="meta">
  <span class="badge live"><span class="dot"></span><span id="statusText">불러오는 중…</span></span>
  <span class="badge" id="regimeBadge" style="display:none"></span>
  <span class="badge info" id="updatedBadge" style="display:none"></span>
  <span class="badge info" id="sourceBadge" style="display:none"></span>
  <button class="refresh" id="refreshBtn">↻ 새로고침</button>
</div>

<main class="main">
  <div id="content">
    <div class="state-box"><div class="spinner"></div><h2>신호를 불러오는 중…</h2></div>
  </div>
</main>

<footer class="foot">
  <div class="disc">
    <b>⚠️ 투자 참고용 신호일 뿐 매매 권유가 아닙니다.</b> 표시된 목표가·손절가는 전략 규칙에
    따른 예시이며, 실제 투자 판단과 손실 책임은 전적으로 본인에게 있습니다.
  </div>
</footer>

<script>
const SIGNALS_URL = 'state/signals_latest.json';
const AUTO_REFRESH_MS = 3 * 60 * 1000; // 3분마다 자동 갱신

const $ = (id) => document.getElementById(id);

function fmtNum(n){ return Number(n).toLocaleString('ko-KR'); }

function pct(from, to){ return ((to/from - 1) * 100); }

function timeAgo(iso){
  if(!iso) return '데이터 없음';
  const d = new Date(iso);
  if(isNaN(d)) return iso;
  const diff = (Date.now() - d.getTime())/1000;
  if(diff < 60) return '방금 전';
  if(diff < 3600) return Math.floor(diff/60) + '분 전';
  if(diff < 86400) return Math.floor(diff/3600) + '시간 전';
  return d.toLocaleString('ko-KR');
}

function cardHTML(c, tier){
  const name = c.name || c.code;
  const upPct = pct(c.close, c.target);
  const dnPct = pct(c.close, c.stop);
  const dist = (c.dist_pct != null)
    ? `<span class="c-dist">20일선 ${c.dist_pct >= 0 ? '+' : ''}${c.dist_pct}%</span>` : '';
  return `
  <div class="card ${tier}">
    <div class="c-top">
      <span class="c-name">${escapeHTML(name)}</span>
      <span class="c-code">${escapeHTML(c.code)}</span>
    </div>
    <div class="c-price">
      <span class="c-close">${fmtNum(c.close)}</span>
      ${c.rsi != null ? `<span class="c-rsi">RSI ${c.rsi}</span>` : ''}
      ${dist}
    </div>
    <div class="c-levels">
      <div class="lvl target">
        <div class="lvl-lbl">🎯 목표</div>
        <div class="lvl-val">${fmtNum(c.target)}</div>
        <div class="lvl-pct">+${upPct.toFixed(1)}%</div>
      </div>
      <div class="lvl stop">
        <div class="lvl-lbl">🛑 손절</div>
        <div class="lvl-val">${fmtNum(c.stop)}</div>
        <div class="lvl-pct">${dnPct.toFixed(1)}%</div>
      </div>
    </div>
  </div>`;
}

function sectionHTML(title, emoji, hint, items, tier, emptyMsg){
  const body = items.length
    ? `<div class="cards">${items.map(c => cardHTML(c, tier)).join('')}</div>`
    : `<div class="sec-empty">${emptyMsg}</div>`;
  return `
  <section class="section">
    <div class="sec-head">
      <h2>${emoji} ${title}</h2>
      <span class="n">${items.length}</span>
      ${hint ? `<span class="hint">${hint}</span>` : ''}
    </div>
    ${body}
  </section>`;
}

function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function renderEmpty(){
  $('content').innerHTML = `
    <div class="state-box">
      <div class="emoji">📭</div>
      <h2>지금은 매수 신호도 관심 종목도 없습니다</h2>
      <p>상승추세 눌림목 자리가 나오면 이곳에 표시됩니다.
      평일 장중 30분마다 자동으로 스캔합니다.</p>
    </div>`;
}

function renderError(msg){
  $('statusText').textContent = '불러오기 실패';
  $('content').innerHTML = `
    <div class="state-box">
      <div class="emoji">⚠️</div>
      <h2>데이터를 불러오지 못했습니다</h2>
      <p>${escapeHTML(msg)}<br><br>스캔이 아직 한 번도 실행되지 않았거나,
      GitHub Pages가 아직 갱신 중일 수 있습니다.</p>
    </div>`;
}

async function load(){
  $('statusText').textContent = '불러오는 중…';
  try{
    const res = await fetch(SIGNALS_URL + '?t=' + Date.now(), {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const cands = data.candidates || [];
    const watch = data.watch || [];

    $('updatedBadge').style.display = '';
    $('updatedBadge').textContent = '갱신 ' + timeAgo(data.generated_at);
    if(data.source){
      $('sourceBadge').style.display = '';
      $('sourceBadge').textContent = data.source === 'real' ? '실데이터' : data.source;
    }
    const rb = $('regimeBadge');
    if(data.market_regime === true || data.market_regime === false){
      rb.style.display = '';
      rb.textContent = data.market_regime ? '🟢 시장 상승국면' : '🔴 시장 하락국면 · 매수 자제';
      rb.style.color = data.market_regime ? 'var(--green)' : 'var(--red)';
      rb.style.borderColor = data.market_regime ? 'rgba(45,206,137,.3)' : 'rgba(247,95,79,.3)';
    } else { rb.style.display = 'none'; }
    $('statusText').textContent = `매수 ${cands.length} · 관심 ${watch.length}`;

    if(cands.length === 0 && watch.length === 0){ renderEmpty(); return; }
    $('content').innerHTML =
      sectionHTML('매수 신호', '🎯', '20일선 눌림 후 반등 확정', cands, 'buy',
        '오늘은 매수 신호에 딱 맞는 종목이 없습니다. 아래 관심 종목을 지켜보세요.')
      + sectionHTML('관심 · 눌림목 접근', '👀', '상승추세 · 20일선 근접 (반등 대기)', watch, 'watch',
        '20일선에 근접한 상승추세 종목이 없습니다.');
  }catch(e){
    renderError(e.message || String(e));
  }
}

$('refreshBtn').addEventListener('click', load);
load();
setInterval(load, AUTO_REFRESH_MS);
</script>
</body>
</html>
