<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>코스피 단기 전망 대시보드</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080c;--surface:#0d0f17;--card:#111420;--border:#1a1d2e;--border2:#22253a;
  --accent:#4f8ef7;--accent2:#7ba8ff;
  --green:#2dce89;--red:#f75f4f;--gold:#f5c542;--purple:#9b5cf6;--orange:#ff9f43;
  --text:#e8ecf5;--sub:#6b7290;--muted:#8a90ad;--dim:#2a2d42;
}
body{background:var(--bg);color:var(--text);font-family:'Inter','Apple SD Gothic Neo','Malgun Gothic','Segoe UI',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}

/* HEADER */
.hdr{padding:24px 20px 18px;border-bottom:1px solid var(--border);background:linear-gradient(160deg,#0b0e19 0%,var(--bg) 100%);position:relative;overflow:hidden}
.hdr::after{content:'';position:absolute;top:-80px;right:-60px;width:300px;height:300px;background:radial-gradient(circle,rgba(79,142,247,.08) 0%,transparent 65%);pointer-events:none}
.hdr-row{display:flex;align-items:center;gap:11px;max-width:1040px;margin:0 auto}
.logo{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hdr h1{font-size:19px;font-weight:800;letter-spacing:-.3px}
.hdr h1 small{display:block;font-size:11px;font-weight:500;color:var(--sub);margin-top:2px;letter-spacing:0}
.meta{max-width:1040px;margin:14px auto 0;display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:0 20px}
.badge{display:inline-flex;align-items:center;gap:6px;border-radius:7px;padding:4px 11px;font-size:11.5px;font-weight:600}
.badge.live{background:rgba(45,206,137,.1);border:1px solid rgba(45,206,137,.22);color:var(--green)}
.badge.info{background:rgba(79,142,247,.08);border:1px solid rgba(79,142,247,.18);color:var(--accent2)}
.badge .dot{width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor}
.controls{margin-left:auto;display:flex;align-items:center;gap:8px}
.refresh{background:var(--card);border:1px solid var(--border2);color:var(--sub);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:border-color .2s,color .2s}
.refresh:hover{border-color:var(--accent);color:var(--accent2)}
.refresh:active{transform:scale(.97)}

.main{max-width:1040px;margin:0 auto;padding:20px}

/* HERO */
.hero{display:grid;grid-template-columns:300px 1fr;gap:18px;margin-bottom:18px}
@media(max-width:760px){.hero{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
.gauge-panel{display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-wrap{position:relative;width:240px;height:150px}
.gauge-score{position:absolute;bottom:6px;left:0;right:0;text-align:center}
.gauge-score .num{font-size:46px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums}
.gauge-score .of{font-size:13px;color:var(--sub);font-weight:600}
.bias-badge{margin-top:14px;display:inline-flex;align-items:center;gap:8px;border-radius:10px;padding:8px 16px;font-size:16px;font-weight:800}
.conf{margin-top:8px;font-size:12px;color:var(--sub);font-weight:600}

.kospi-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.kospi-head .lbl{font-size:12px;color:var(--sub);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.kospi-head .val{font-size:30px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.kospi-head .chg{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums}
.outlook{margin-top:14px;font-size:14px;line-height:1.65;color:var(--text)}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}
@media(max-width:520px){.charts{grid-template-columns:1fr}}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 12px 6px}
.chart-box h4{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px;display:flex;justify-content:space-between;align-items:baseline}
.chart-box h4 span{font-size:13px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums}
.spark{width:100%;height:64px;display:block;overflow:visible}

/* SECTION TITLE */
.sec-title{font-size:13px;font-weight:800;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin:6px 4px 12px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* FACTOR GRID */
.factors{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.factors{grid-template-columns:1fr}}
.fcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
.fcard-top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.fcard-icon{font-size:20px}
.fcard-name{font-size:15px;font-weight:800}
.fcard-w{margin-left:auto;font-size:10.5px;color:var(--sub);font-weight:700;background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:2px 7px}
.fcard-avail{margin-left:8px;font-size:10px;font-weight:800;background:transparent;border:1px solid currentColor;border-radius:6px;padding:2px 7px;opacity:.85}
.data-note{max-width:1040px;margin:10px auto 0;padding:0 20px}
.data-note .inner{background:rgba(245,197,66,.06);border:1px solid rgba(245,197,66,.2);border-radius:9px;padding:9px 13px;font-size:11.5px;line-height:1.55;color:var(--sub)}
.data-note b{color:var(--gold)}

/* TOOLTIP DOT */
.info-dot{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;border:1px solid var(--border2);color:var(--sub);font-size:9px;font-weight:800;cursor:help;margin-left:5px;vertical-align:middle}
.info-dot:hover{color:var(--accent2);border-color:var(--accent)}

/* WEEKLY CHANGE */
.wc-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:18px}
.wc-head{font-size:13.5px;font-weight:700;margin-bottom:8px}
.wc-formula{font-size:11.5px;color:var(--sub);font-family:'Courier New',monospace;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 11px;margin-bottom:12px;display:inline-block}
.wc-movers{display:flex;flex-wrap:wrap;gap:9px}
.mv{display:inline-flex;flex-direction:column;gap:1px;border:1px solid var(--border2);border-radius:9px;padding:6px 11px;font-size:12px}
.mv-sub{font-size:10px;color:var(--sub);font-variant-numeric:tabular-nums}
.wc-none{font-size:12px;color:var(--sub)}

/* WIN/LOSS ROW */
.wl{display:flex;flex-wrap:wrap;gap:16px;font-size:12px;color:var(--sub);margin:-4px 0 14px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px}
.wl b{font-variant-numeric:tabular-nums;color:var(--text)}

/* SUB HEADING + VERDICT + TABLES */
.sub-h{font-size:12px;font-weight:800;color:var(--muted);margin:16px 0 9px;display:flex;align-items:center;gap:2px}
.bt-verdict{font-size:12px;color:var(--sub);margin-top:8px}
.bt-verdict b{font-variant-numeric:tabular-nums}
.tbl-scroll{overflow-x:auto;border:1px solid var(--border);border-radius:10px}
.vtbl{width:100%;border-collapse:collapse;font-size:12px;min-width:340px}
.vtbl th{text-align:right;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--sub);padding:9px 11px;border-bottom:1px solid var(--border2);white-space:nowrap;background:var(--surface)}
.vtbl th.l,.vtbl td.l{text-align:left}
.vtbl td{text-align:right;padding:8px 11px;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums;white-space:nowrap}
.vtbl tbody tr:last-child td{border-bottom:none}
.vtbl tr.comp{background:rgba(79,142,247,.06)}
.vtbl tr.comp td{font-weight:800}
.tag{display:inline-block;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:800}
.tag.ok{background:rgba(45,206,137,.12);color:var(--green);border:1px solid rgba(45,206,137,.3)}
.tag.warn{background:rgba(245,197,66,.1);color:var(--gold);border:1px solid rgba(245,197,66,.28)}
.val-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.val-grid{grid-template-columns:1fr}}

/* BACKTEST */
.bt-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px}
.bt-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.bt-head h3{font-size:15px;font-weight:800}
.bt-head .rng{font-size:11.5px;color:var(--sub);font-weight:600}
.bt-desc{font-size:11.5px;color:var(--sub);line-height:1.55;margin-bottom:14px}
.bt-tiles{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
@media(max-width:680px){.bt-tiles{grid-template-columns:repeat(2,1fr)}}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 12px}
.tile .t-lbl{font-size:10.5px;color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.tile .t-val{font-size:20px;font-weight:900;font-variant-numeric:tabular-nums;margin-top:5px}
.tile .t-sub{font-size:10.5px;color:var(--sub);font-variant-numeric:tabular-nums;margin-top:2px}
.bt-legend{display:flex;gap:16px;align-items:center;margin:0 0 6px;font-size:11.5px;font-weight:600}
.bt-legend .k{display:inline-flex;align-items:center;gap:6px;color:var(--sub)}
.bt-legend .ln{width:16px;height:3px;border-radius:2px}
.eq-chart{width:100%;height:200px;display:block;overflow:visible}
.fcard-desc{font-size:11.5px;color:var(--sub);line-height:1.5;margin-bottom:12px}
.fscore-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.fscore-num{font-size:22px;font-weight:900;font-variant-numeric:tabular-nums;min-width:52px}
.fbar{flex:1;height:9px;border-radius:5px;background:var(--dim);overflow:hidden;position:relative}
.fbar>span{display:block;height:100%;border-radius:5px}
.fscore-bias{font-size:11px;font-weight:800;border-radius:6px;padding:3px 9px;white-space:nowrap}

.sig{padding:8px 0;border-top:1px solid var(--border)}
.sig-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:5px}
.sig-name{font-size:12.5px;font-weight:700}
.sig-detail{font-size:11px;color:var(--sub);font-variant-numeric:tabular-nums;text-align:right}
.sig-bar{height:5px;border-radius:3px;background:var(--dim);overflow:hidden;position:relative}
.sig-bar .mid{position:absolute;left:50%;top:-1px;bottom:-1px;width:1px;background:var(--border2)}
.sig-bar>span{display:block;height:100%;border-radius:3px}
.sig.na .sig-name,.sig.na .sig-detail{color:var(--dim)}

.legend{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin:2px 4px 16px;font-size:11.5px;color:var(--sub)}
.legend .k{display:inline-flex;align-items:center;gap:5px;font-weight:600}
.legend .sw{width:11px;height:11px;border-radius:3px}

/* STATES */
.state-box{text-align:center;padding:60px 24px;color:var(--sub)}
.state-box .emoji{font-size:44px;margin-bottom:14px;opacity:.85}
.state-box h2{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.state-box p{font-size:13px;line-height:1.6;max-width:420px;margin:0 auto}
.spinner{width:34px;height:34px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* DISCLAIMER */
.foot{max-width:1040px;margin:8px auto 40px;padding:16px 20px}
.disc{background:rgba(247,95,79,.05);border:1px solid rgba(247,95,79,.16);border-radius:10px;padding:12px 15px;font-size:12px;line-height:1.6;color:var(--sub)}
.disc b{color:#f7a99f}

.tt{position:fixed;pointer-events:none;background:#050609;border:1px solid var(--border2);border-radius:8px;padding:7px 10px;font-size:11.5px;color:var(--text);box-shadow:0 6px 20px rgba(0,0,0,.5);opacity:0;transition:opacity .12s;z-index:20;white-space:nowrap}
.tt b{font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-row">
    <div class="logo">📊</div>
    <h1>코스피 단기 전망 대시보드<small>거시·한국경제·실적·수급·밸류에이션·기술 6팩터 종합 · 장마감 후 매일 갱신</small></h1>
  </div>
</header>

<div class="meta">
  <span class="badge live"><span class="dot"></span><span id="statusText">불러오는 중…</span></span>
  <span class="badge info" id="dateBadge" style="display:none"></span>
  <div class="controls">
    <a class="refresh" href="dashboard.html" style="text-decoration:none">📈 종목 스코어</a>
    <button class="refresh" id="refreshBtn">↻ 새로고침</button>
  </div>
</div>

<main class="main">
  <div id="content">
    <div class="state-box"><div class="spinner"></div><h2>전망을 불러오는 중…</h2></div>
  </div>
</main>

<footer class="foot">
  <div class="disc" id="discBox">
    <b>⚠️ 이 대시보드는 공개 시장데이터 기반의 참고용 전망 점수만 제공합니다.</b>
    표시된 종합점수·팩터점수·방향은 규칙 기반 계산 결과일 뿐 매매 권유가 아니며,
    전망은 불확실하며 언제든 빗나갈 수 있습니다. 실제 투자 판단과 책임은 본인에게 있으며,
    이 시스템에는 어떤 자동 매수/매도 주문 기능도 없습니다.
  </div>
</footer>

<div class="tt" id="tt"></div>

<script>
const FORECAST_URL = 'results/kospi_forecast.json';
const HISTORY_URL  = 'results/kospi_history.csv';
const BACKTEST_URL = 'results/kospi_backtest.json';
const VALIDATION_URL = 'results/kospi_validation.json';
const $ = (id) => document.getElementById(id);

function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
const fmtNum = (n,d=0) => Number(n).toLocaleString('ko-KR',{minimumFractionDigits:d,maximumFractionDigits:d});

// 점수(0~100) → 색: 약세(적)·중립(금)·강세(녹). 라벨과 항상 병기하므로 색 단독 아님.
function scoreColor(s){
  if(s >= 57) return 'var(--green)';
  if(s > 43)  return 'var(--gold)';
  return 'var(--red)';
}
function scoreRGBA(s,a){
  if(s >= 57) return `rgba(45,206,137,${a})`;
  if(s > 43)  return `rgba(245,197,66,${a})`;
  return `rgba(247,95,79,${a})`;
}
function biasStyle(s){
  const c = scoreColor(s);
  return `color:${c};background:${scoreRGBA(s,.12)};border:1px solid ${scoreRGBA(s,.3)}`;
}

/* ---- 반원 게이지 (다이버징: 약세 ← 중립 → 강세) ---- */
function gaugeSVG(score){
  const cx=120, cy=130, r=100, sw=18;
  const polar = (deg)=>{const a=(180-deg)*Math.PI/180;return [cx+r*Math.cos(a), cy-r*Math.sin(a)];};
  // score 0..100 → angle 0..180
  const arc = (a0,a1,color)=>{
    const [x0,y0]=polar(a0), [x1,y1]=polar(a1);
    const large = (a1-a0)>180?1:0;
    return `<path d="M ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="butt"/>`;
  };
  const toA = (sc)=> sc/100*180;
  // 3구간(2° 갭): 약세 0-43, 중립 43-57, 강세 57-100
  let segs = '';
  segs += arc(toA(0),  toA(43)-2, 'rgba(247,95,79,.55)');
  segs += arc(toA(43)+1, toA(57)-1, 'rgba(245,197,66,.55)');
  segs += arc(toA(57)+2, toA(100), 'rgba(45,206,137,.55)');
  // 활성 채움(0 → score) 위에 밝게
  const a = toA(Math.max(0,Math.min(100,score)));
  segs += arc(0.5, Math.max(1,a), scoreColor(score));
  // needle
  const [nx,ny]=polar(a);
  const needle = `<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="var(--text)" stroke-width="2.5" stroke-linecap="round"/><circle cx="${cx}" cy="${cy}" r="5" fill="var(--text)"/>`;
  return `<svg viewBox="0 0 240 150" class="gauge-svg" width="240" height="150">
    ${segs}${needle}
    <text x="14" y="148" fill="var(--sub)" font-size="10" font-weight="700">약세</text>
    <text x="226" y="148" fill="var(--sub)" font-size="10" font-weight="700" text-anchor="end">강세</text>
  </svg>`;
}

function factorCard(f){
  const bar = `<div class="fbar"><span style="width:${f.score}%;background:${scoreColor(f.score)}"></span></div>`;
  const nAvail = f.available_signals, nTot = f.total_signals;
  let availChip = '';
  if(nTot != null){
    const full = nAvail === nTot, none = nAvail === 0;
    const col = none ? 'var(--red)' : (full ? 'var(--green)' : 'var(--gold)');
    availChip = `<span class="fcard-avail" title="이 팩터에 실제로 반영된 실데이터 신호 수" style="color:${col};border-color:${col}">실데이터 ${nAvail}/${nTot}</span>`;
  }
  const sigs = f.signals.map(s=>{
    const na = s.available ? '' : ' na';
    const fill = s.available
      ? `<span style="width:${s.score}%;background:${scoreColor(s.score)}"></span>`
      : `<span style="width:0"></span>`;
    return `<div class="sig${na}">
      <div class="sig-top">
        <span class="sig-name">${escapeHTML(s.name)}</span>
        <span class="sig-detail">${escapeHTML(s.detail)}${s.available?` · ${s.score.toFixed(0)}`:''}</span>
      </div>
      <div class="sig-bar"><span class="mid"></span>${fill}</div>
    </div>`;
  }).join('');
  return `<div class="fcard">
    <div class="fcard-top">
      <span class="fcard-icon">${f.icon}</span>
      <span class="fcard-name">${escapeHTML(f.label)}</span>
      ${availChip}
      <span class="fcard-w">비중 ${(f.weight*100).toFixed(0)}%</span>
    </div>
    <div class="fcard-desc">${escapeHTML(f.desc)}</div>
    <div class="fscore-row">
      <span class="fscore-num" style="color:${scoreColor(f.score)}">${f.score.toFixed(0)}</span>
      ${bar}
      <span class="fscore-bias" style="${biasStyle(f.score)}">${escapeHTML(f.bias)}</span>
    </div>
    ${sigs}
  </div>`;
}

/* ---- 스파크라인 (단일 시계열, 얇은 2px 라인 + 호버 크로스헤어) ---- */
function sparkline(el, pts, {color, fmt}){
  if(pts.length < 2){ el.innerHTML = ''; return; }
  const W=el.clientWidth||300, H=64, pad=6;
  const xs = pts.map((_,i)=>i), ys = pts.map(p=>p.v);
  const ymin=Math.min(...ys), ymax=Math.max(...ys), yr=(ymax-ymin)||1;
  const X = i => pad + i/(pts.length-1)*(W-2*pad);
  const Y = v => H-pad - (v-ymin)/yr*(H-2*pad);
  const d = pts.map((p,i)=>`${i?'L':'M'}${X(i).toFixed(1)} ${Y(p.v).toFixed(1)}`).join(' ');
  const area = `M${X(0)} ${H-pad} `+pts.map((p,i)=>`L${X(i).toFixed(1)} ${Y(p.v).toFixed(1)}`).join(' ')+` L${X(pts.length-1)} ${H-pad} Z`;
  const gid = 'g'+Math.random().toString(36).slice(2,7);
  el.setAttribute('viewBox',`0 0 ${W} ${H}`);
  el.innerHTML = `
    <defs><linearGradient id="${gid}" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="${color}" stop-opacity=".22"/><stop offset="1" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${X(pts.length-1)}" cy="${Y(ys[ys.length-1])}" r="3" fill="${color}"/>
    <line class="cross" x1="0" x2="0" y1="${pad}" y2="${H-pad}" stroke="var(--border2)" stroke-width="1" style="opacity:0"/>
    <circle class="dot" r="3.5" fill="${color}" stroke="var(--bg)" stroke-width="1.5" style="opacity:0"/>`;
  const cross=el.querySelector('.cross'), dot=el.querySelector('.dot'), tt=$('tt');
  el.onmousemove = (e)=>{
    const rect=el.getBoundingClientRect();
    const rx=(e.clientX-rect.left)/rect.width*W;
    let i=Math.round((rx-pad)/((W-2*pad))*(pts.length-1));
    i=Math.max(0,Math.min(pts.length-1,i));
    const px=X(i), py=Y(ys[i]);
    cross.setAttribute('x1',px);cross.setAttribute('x2',px);cross.style.opacity=1;
    dot.setAttribute('cx',px);dot.setAttribute('cy',py);dot.style.opacity=1;
    tt.innerHTML=`${escapeHTML(pts[i].d)} · <b>${fmt(pts[i].v)}</b>`;
    tt.style.opacity=1;tt.style.left=(e.clientX+12)+'px';tt.style.top=(e.clientY-34)+'px';
  };
  el.onmouseleave = ()=>{cross.style.opacity=0;dot.style.opacity=0;$('tt').style.opacity=0;};
}

/* ---- 자산곡선 (전략 vs 단순보유, 2계열 단일축 라인 + 호버) ---- */
function equityChart(el, curve){
  if(!curve || curve.length < 2){ el.innerHTML=''; return; }
  const W=el.clientWidth||600, H=200, padL=6, padR=6, padT=10, padB=18;
  const all = curve.flatMap(p=>[p.strat, p.bh]);
  const ymin=Math.min(...all), ymax=Math.max(...all), yr=(ymax-ymin)||1;
  const X = i => padL + i/(curve.length-1)*(W-padL-padR);
  const Y = v => H-padB - (v-ymin)/yr*(H-padT-padB);
  const line = (key) => curve.map((p,i)=>`${i?'L':'M'}${X(i).toFixed(1)} ${Y(p[key]).toFixed(1)}`).join(' ');
  const gStrat='var(--green)', gBH='var(--sub)';
  // 기준선(자산=1.0)
  const y1 = Y(1.0);
  el.setAttribute('viewBox',`0 0 ${W} ${H}`);
  el.innerHTML = `
    ${(1.0>=ymin&&1.0<=ymax)?`<line x1="${padL}" x2="${W-padR}" y1="${y1}" y2="${y1}" stroke="var(--border2)" stroke-dasharray="3 3" stroke-width="1"/>`:''}
    <path d="${line('bh')}" fill="none" stroke="${gBH}" stroke-width="2" stroke-linejoin="round" opacity=".8"/>
    <path d="${line('strat')}" fill="none" stroke="${gStrat}" stroke-width="2.4" stroke-linejoin="round"/>
    <line class="cross" x1="0" x2="0" y1="${padT}" y2="${H-padB}" stroke="var(--border2)" stroke-width="1" style="opacity:0"/>
    <circle class="ds" r="4" fill="${gStrat}" stroke="var(--bg)" stroke-width="1.5" style="opacity:0"/>
    <circle class="db" r="4" fill="${gBH}" stroke="var(--bg)" stroke-width="1.5" style="opacity:0"/>`;
  const cross=el.querySelector('.cross'), ds=el.querySelector('.ds'), db=el.querySelector('.db'), tt=$('tt');
  el.onmousemove=(e)=>{
    const rect=el.getBoundingClientRect();
    let i=Math.round(((e.clientX-rect.left)/rect.width*W - padL)/((W-padL-padR))*(curve.length-1));
    i=Math.max(0,Math.min(curve.length-1,i));
    const px=X(i);
    cross.setAttribute('x1',px);cross.setAttribute('x2',px);cross.style.opacity=1;
    ds.setAttribute('cx',px);ds.setAttribute('cy',Y(curve[i].strat));ds.style.opacity=1;
    db.setAttribute('cx',px);db.setAttribute('cy',Y(curve[i].bh));db.style.opacity=1;
    const pct=v=>((v-1)*100>=0?'+':'')+((v-1)*100).toFixed(1)+'%';
    tt.innerHTML=`${escapeHTML(curve[i].d)}<br>전략 <b style="color:var(--green)">${pct(curve[i].strat)}</b> · 보유 <b>${pct(curve[i].bh)}</b>`;
    tt.style.opacity=1;tt.style.left=(e.clientX+12)+'px';tt.style.top=(e.clientY-42)+'px';
  };
  el.onmouseleave=()=>{cross.style.opacity=0;ds.style.opacity=0;db.style.opacity=0;$('tt').style.opacity=0;};
}

function pctSigned(x){ return (x>=0?'+':'')+(x*100).toFixed(1)+'%'; }

/* ---- 항목7: 이번 주 점수 변화 요인 (고정 가중치 계산식 분해) ---- */
function weeklyChangeSection(fc){
  const wc = fc.weekly_change;
  if(!wc || !wc.factors || !wc.factors.length) return '';
  const movers = wc.factors.filter(c=>Math.abs(c.contrib_delta) >= 0.05).slice(0,5);
  const chip = (c)=>{
    const up = c.contrib_delta>=0;
    const col = up?'var(--green)':'var(--red)';
    return `<span class="mv" style="border-color:${col}"><b style="color:${col}">${c.icon} ${escapeHTML(c.label)} ${up?'+':''}${c.contrib_delta.toFixed(1)}점</b>
      <span class="mv-sub">${c.score_prev}→${c.score_now}</span></span>`;
  };
  const sd = wc.score_delta;
  const sdTxt = sd==null?'':`<b style="color:${sd>=0?'var(--green)':'var(--red)'}">${sd>=0?'+':''}${sd.toFixed(1)}점</b>`;
  return `
  <div class="sec-title">이번 주 점수 변화 요인 <span class="info-dot" title="종합점수 = Σ(팩터 가중치 × 팩터 점수). 전주(약 5거래일 전) 대비 각 팩터의 기여분(가중치×점수) 변화를 그대로 분해한 값입니다. 모델 기반 설명(SHAP 등)이 아니라 고정 가중치 계산식 분해입니다.">ⓘ</span></div>
  <div class="wc-wrap">
    <div class="wc-head">전주(${escapeHTML(wc.ref_date)}) 대비 종합점수 ${wc.score_prev}→${wc.score_now} ${sdTxt}</div>
    <div class="wc-formula">종합점수 = Σ ( 팩터 가중치 × 팩터 점수 )</div>
    ${movers.length ? `<div class="wc-movers">${movers.map(chip).join('')}</div>`
      : `<div class="wc-none">지난 주 대비 팩터 기여 변화가 미미합니다(±0.05점 미만).</div>`}
  </div>`;
}

/* ---- 항목1·3·5: 백테스트 (워크포워드 + 구간별 + 승률·손익비 분해) ---- */
function backtestSection(bt){
  if(!bt || !bt.strategy) return '';
  const s=bt.strategy, h=bt.buy_hold, x=bt.excess;
  const exCol = x.total_return>=0 ? 'var(--green)' : 'var(--red)';
  const wr = s.win_rate!=null ? (s.win_rate*100).toFixed(0)+'%' : '–';
  const payoff = s.payoff!=null ? s.payoff.toFixed(2) : '–';
  const top5 = s.top5_win_share!=null ? (s.top5_win_share*100).toFixed(0)+'%' : '–';
  const tiles = [
    {lbl:'전략 총수익', val:pctSigned(s.total_return), sub:`연 ${pctSigned(s.cagr)}`, col:s.total_return>=0?'var(--green)':'var(--red)'},
    {lbl:'단순보유 대비', val:pctSigned(x.total_return)+'p', sub:`CAGR ${pctSigned(x.cagr)}p`, col:exCol},
    {lbl:'최대낙폭(MDD)', val:(s.mdd*100).toFixed(1)+'%', sub:`보유 ${(h.mdd*100).toFixed(1)}%`, col:'var(--text)'},
    {lbl:'샤프비율', val:s.sharpe.toFixed(2), sub:`보유 ${h.sharpe.toFixed(2)}`, col:'var(--text)'},
    {lbl:'승률 · 손익비', val:`${wr}`, sub:`손익비 ${payoff} · ${s.n_trades}회`, col:'var(--text)'},
  ].map(t=>`<div class="tile"><div class="t-lbl">${t.lbl}</div><div class="t-val" style="color:${t.col}">${t.val}</div><div class="t-sub">${t.sub}</div></div>`).join('');

  // 항목5: 승률-손익비 분해
  const wlRow = (s.avg_win!=null) ? `
    <div class="wl">
      <span>평균 익절 <b style="color:var(--green)">${pctSigned(s.avg_win)}</b></span>
      <span>평균 손절 <b style="color:var(--red)">${pctSigned(s.avg_loss)}</b></span>
      <span>손익비 <b>${payoff}</b></span>
      <span title="상위 5개 이익 거래가 전체 이익합에서 차지하는 비중. 높을수록 소수 대박(outlier)에 의존.">상위5거래 이익기여 <b style="color:${(s.top5_win_share||0)>0.6?'var(--gold)':'var(--text)'}">${top5}</b></span>
    </div>` : '';

  // 항목3: 구간별 성과표
  const sp = (bt.subperiods||[]);
  const spPositive = sp.filter(p=>p.excess_return>0).length;
  const spRows = sp.map(p=>{
    const c = p.excess_return>=0?'var(--green)':'var(--red)';
    return `<tr><td class="l">${escapeHTML(p.period)}</td><td>${p.n_days}</td>
      <td>${pctSigned(p.strategy_return)}</td><td>${pctSigned(p.buy_hold_return)}</td>
      <td style="color:${c};font-weight:800">${pctSigned(p.excess_return)}p</td></tr>`;
  }).join('');
  const wf = bt.mode==='walkforward';
  const desc = wf
    ? `매 ${bt.params.rebalance}거래일마다 <b>과거 데이터만으로 매수/매도 임계값을 재추정</b>(최소 롤링윈도 ${Math.round(bt.params.min_window/21)}개월)하고 그 임계값으로 신호 생성. 다음날 체결·비용 ${(bt.params.cost*100).toFixed(1)}%/회. 임계값 재추정 ${bt.threshold_reestimations}회. 시장노출 ${(s.time_in_market*100).toFixed(0)}%.`
    : `고정 임계값(54/46) 기준선. 시장노출 ${(s.time_in_market*100).toFixed(0)}%.`;

  return `
  <div class="sec-title">전망 점수 백테스트 ${wf?'(진짜 워크포워드 · 임계값 재추정 · 미래참조 없음)':'(고정 임계값)'}</div>
  <div class="bt-wrap">
    <div class="bt-head"><h3>매수/현금 시그널 vs 단순보유</h3>
      <span class="rng">${escapeHTML(bt.date_range[0])} ~ ${escapeHTML(bt.date_range[1])} · ${bt.n_days}거래일</span></div>
    <div class="bt-desc">${desc}</div>
    <div class="bt-tiles">${tiles}</div>
    ${wlRow}
    <div class="bt-legend">
      <span class="k"><span class="ln" style="background:var(--green)"></span>전망점수 전략</span>
      <span class="k"><span class="ln" style="background:var(--sub)"></span>단순보유(Buy&amp;Hold)</span>
    </div>
    <svg class="eq-chart" id="eqChart"></svg>
    ${sp.length ? `
    <h4 class="sub-h">구간별 성과 — 초과수익이 특정 구간에 쏠렸는지 <span class="info-dot" title="완료기준: 초과수익이 한 구간에만 쏠리지 않고 최소 2개 이상 구간에서 일관되게 (+)여야 신뢰. 최근 구간에만 (+)면 최근 상승장 의존.">ⓘ</span></h4>
    <div class="tbl-scroll"><table class="vtbl">
      <thead><tr><th class="l">구간</th><th>거래일</th><th>전략</th><th>단순보유</th><th>초과수익</th></tr></thead>
      <tbody>${spRows}</tbody>
    </table></div>
    <div class="bt-verdict">초과수익 (+) 구간: <b style="color:${spPositive>=2?'var(--green)':'var(--gold)'}">${spPositive}/${sp.length}</b>
      ${spPositive>=2?'— 여러 구간에서 일관':'— 특정 구간 쏠림 주의'}</div>` : ''}
  </div>`;
}

/* ---- 항목2·4: 검증 (팩터 유효성 IC + 점수-미래수익) ---- */
function validationSection(val){
  if(!val || !val.factor_ic) return '';
  const H = val.horizon_days;
  const icRows = val.factor_ic.map(r=>{
    const isComp = r.key==='_composite';
    const sigTxt = r.significant ? `<span class="tag ok">유의</span>`
      : (r.removal_candidate ? `<span class="tag warn">제거후보</span>` : '');
    const ricCol = r.rank_ic>=0?'var(--green)':'var(--red)';
    return `<tr class="${isComp?'comp':''}"><td class="l">${escapeHTML(r.label)}</td>
      <td style="color:${r.ic>=0?'var(--green)':'var(--red)'}">${r.ic>=0?'+':''}${r.ic.toFixed(3)}</td>
      <td style="color:${ricCol};font-weight:800">${r.rank_ic>=0?'+':''}${r.rank_ic.toFixed(3)}</td>
      <td>${r.t_stat>=0?'+':''}${r.t_stat.toFixed(2)}</td><td>${sigTxt}</td></tr>`;
  }).join('');
  const svf = val.score_vs_forward || {};
  const bkRows = (svf.bucket_table||[]).map(b=>{
    const c = b.avg_fwd_return>=0?'var(--green)':'var(--red)';
    return `<tr><td class="l">${escapeHTML(b.bucket)}</td><td>${b.n}</td>
      <td style="color:${c}">${pctSigned(b.avg_fwd_return)}</td>
      <td>${(b.up_ratio*100).toFixed(0)}%</td></tr>`;
  }).join('');
  const sig = val.significant_factor_count;
  return `
  <div class="sec-title">검증 — 점수가 실제 미래수익을 설명하는가</div>
  <div class="val-grid">
    <div class="bt-wrap">
      <h4 class="sub-h">팩터 유효성 (IC / Rank IC) <span class="info-dot" title="IC(Information Coefficient)=팩터점수와 ${H}거래일 후 수익률의 상관. Rank IC=순위상관(이상치에 강건). |t|≥1.96 이면 통계적으로 유의(단, 20일 라벨 겹침으로 t는 과대평가 경향). 단기 지수 IC는 원래 작습니다(0.05~0.1도 유의미).">ⓘ</span></h4>
      <div class="tbl-scroll"><table class="vtbl">
        <thead><tr><th class="l">대상</th><th>IC</th><th>Rank IC</th><th>t</th><th></th></tr></thead>
        <tbody>${icRows}</tbody>
      </table></div>
      <div class="bt-verdict">통계적으로 유의한 팩터: <b style="color:${sig>=3?'var(--green)':'var(--gold)'}">${sig}/6</b>
        · 라벨: ${H}거래일 후 KOSPI 수익률 · 표본 ${svf.n||val.factor_ic[0].n}</div>
    </div>
    <div class="bt-wrap">
      <h4 class="sub-h">종합점수 → ${H}일 후 수익률 <span class="info-dot" title="가로축=그날의 종합점수(0~100), 세로축=그 뒤 ${H}거래일 KOSPI 수익률. 우상향 관계면 점수의 예측력이 있다는 뜻. 종합점수 IC ${(svf.composite_ic!=null?svf.composite_ic.toFixed(3):'–')}.">ⓘ</span></h4>
      <svg class="eq-chart" id="scatterChart" style="height:180px"></svg>
      <div class="tbl-scroll" style="margin-top:8px"><table class="vtbl">
        <thead><tr><th class="l">점수대</th><th>표본</th><th>평균 ${H}일 수익</th><th>상승비율</th></tr></thead>
        <tbody>${bkRows}</tbody>
      </table></div>
    </div>
  </div>`;
}

/* ---- 산점도 (점수 vs 미래수익) ---- */
function scatterChart(el, pts){
  if(!pts || pts.length<3){ el.innerHTML=''; return; }
  const W=el.clientWidth||500, H=180, pad=26;
  const xs=pts.map(p=>p.score), ys=pts.map(p=>p.fwd);
  const xmin=0, xmax=100;
  let ymin=Math.min(...ys), ymax=Math.max(...ys); const yr=(ymax-ymin)||1; ymin-=yr*0.05; ymax+=yr*0.05;
  const X=v=>pad+(v-xmin)/(xmax-xmin)*(W-pad-8);
  const Y=v=>H-pad-(v-ymin)/(ymax-ymin)*(H-pad-8);
  const y0=Y(0), x50=X(50);
  const dots=pts.map(p=>`<circle cx="${X(p.score).toFixed(1)}" cy="${Y(p.fwd).toFixed(1)}" r="2.2" fill="${p.fwd>=0?'rgba(45,206,137,.55)':'rgba(247,95,79,.55)'}"/>`).join('');
  el.setAttribute('viewBox',`0 0 ${W} ${H}`);
  el.innerHTML = `
    <line x1="${pad}" x2="${W-8}" y1="${y0}" y2="${y0}" stroke="var(--border2)" stroke-dasharray="3 3"/>
    <line x1="${x50}" x2="${x50}" y1="8" y2="${H-pad}" stroke="var(--border2)" stroke-dasharray="3 3"/>
    ${dots}
    <text x="${x50}" y="${H-8}" fill="var(--sub)" font-size="10" text-anchor="middle">종합점수 50</text>
    <text x="${pad-4}" y="${y0-4}" fill="var(--sub)" font-size="10" text-anchor="start">0%</text>`;
}

    저장소 Secrets 에 <code>KRX_ID</code>·<code>KRX_PW</code>(무료 KRX 계정)를 넣으면 6팩터 전부 실데이터로 갱신됩니다.
  </div></div>` : ''}
  <div class="sec-title">6팩터 세부 진단</div>
  <div class="legend">
    <span class="k"><span class="sw" style="background:var(--red)"></span>약세(0~43)</span>
    <span class="k"><span class="sw" style="background:var(--gold)"></span>중립(43~57)</span>
    <span class="k"><span class="sw" style="background:var(--green)"></span>강세(57~100)</span>
    <span class="k" style="margin-left:auto">각 팩터·신호는 0~100점(50=중립)</span>
  </div>
  <div class="factors">${fc.factors.map(factorCard).join('')}</div>
  ${weeklyChangeSection(fc)}
  ${backtestSection(bt)}
  ${validationSection(val)}`;
  $('content').innerHTML = html;

  const scorePts = hist.map(h=>({d:h.date, v:+h.score}));
  const kospiPts = hist.map(h=>({d:h.date, v:+h.kospi_close}));
  sparkline($('sparkScore'), scorePts, {color:scoreColor(fc.score), fmt:v=>v.toFixed(1)+'점'});
  sparkline($('sparkKospi'), kospiPts, {color:'var(--accent)', fmt:v=>fmtNum(v,0)});
  if(bt && bt.equity) equityChart($('eqChart'), bt.equity);
  if(val && val.score_vs_forward && val.score_vs_forward.scatter) scatterChart($('scatterChart'), val.score_vs_forward.scatter);
  if(fc.disclaimer) $('discBox').innerHTML = '<b>⚠️ '+escapeHTML(fc.disclaimer.split('.')[0])+'.</b> '+escapeHTML(fc.disclaimer.split('.').slice(1).join('.').trim());
}

function parseCSV(text){
  const lines = text.trim().split(/\r?\n/);
  const head = lines[0].split(',');
  return lines.slice(1).map(l=>{const c=l.split(',');return Object.fromEntries(head.map((h,i)=>[h,c[i]]));});
}

function renderError(msg){
  $('statusText').textContent = '불러오기 실패';
  $('content').innerHTML = `
    <div class="state-box"><div class="emoji">⚠️</div>
      <h2>전망 데이터를 불러오지 못했습니다</h2>
      <p>${escapeHTML(msg)}<br><br>전망 스캔이 아직 실행되지 않았거나 GitHub Pages 가 갱신 중일 수 있습니다.
      <br><code>python run_kospi_forecast.py</code> 실행 후 results/ 가 커밋되면 표시됩니다.</p>
    </div>`;
}

async function init(){
  $('statusText').textContent = '불러오는 중…';
  try{
    const [fRes, hRes, bRes, vRes] = await Promise.all([
      fetch(FORECAST_URL+'?t='+Date.now(), {cache:'no-store'}),
      fetch(HISTORY_URL+'?t='+Date.now(), {cache:'no-store'}).catch(()=>null),
      fetch(BACKTEST_URL+'?t='+Date.now(), {cache:'no-store'}).catch(()=>null),
      fetch(VALIDATION_URL+'?t='+Date.now(), {cache:'no-store'}).catch(()=>null),
    ]);
    if(!fRes.ok) throw new Error('HTTP '+fRes.status);
    const fc = await fRes.json();
    let hist = [];
    if(hRes && hRes.ok){ try{ hist = parseCSV(await hRes.text()); }catch(e){} }
    let bt = null, val = null;
    if(bRes && bRes.ok){ try{ bt = await bRes.json(); }catch(e){} }
    if(vRes && vRes.ok){ try{ val = await vRes.json(); }catch(e){} }
    $('dateBadge').style.display='';
    $('dateBadge').textContent = '📅 '+fc.as_of+' 기준';
    $('statusText').textContent = `종합 ${fc.score}점 · ${fc.bias}`;
    render(fc, hist, bt, val);
  }catch(e){
    renderError(e.message || String(e));
  }
}

$('refreshBtn').addEventListener('click', init);
init();
</script>
</body>
</html>
