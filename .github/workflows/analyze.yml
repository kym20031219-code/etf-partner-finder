name: 실데이터 백테스트 & 튜닝

# ⚠️ 이 브랜치(claude/stock-recommendation-closing-trade-*)에서는 이 워크플로우를
#    '종가매매법(오버나이트) 실데이터 검증' 용으로 바꿔서 씁니다. main 의 analyze.yml
#    (눌림목 스윙 백테스트/튜닝) 과는 내용이 다릅니다. 이렇게 한 이유:
#    새로 만든 overnight-*.yml 은 main 에 등록되지 않아 workflow_dispatch 로 돌릴 수
#    없지만, analyze.yml 은 main 에 등록돼 있어 ref=이브랜치 로 지정하면 '이 브랜치의
#    내용'을 GitHub 러너(네트워크 열림)에서 실행할 수 있기 때문입니다.
on:
  workflow_dispatch:
    inputs:
      top:
        description: "분석할 시총 상위 종목 수"
        default: "150"
      start:
        description: "백테스트 시작일"
        default: "2019-01-01"
      slippage:
        description: "매수 슬리피지(보수적, 소수). 0.001 = 0.1%"
        default: "0.001"

permissions:
  contents: write

concurrency:
  group: analyze
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 종가매매 파라미터 최적화 (학습/검증 분리) — 실데이터
        run: >
          python tune_overnight.py --source real --market KOSPI
          --top ${{ inputs.top }} --start ${{ inputs.start }}
          --slippage ${{ inputs.slippage }}
          --out results/overnight_validation.json

      - name: 종가매매 스캔 (분석·성과·오늘의 후보) — 대시보드 갱신
        run: >
          python run_overnight.py --source real --market KOSPI
          --top 200 --start ${{ inputs.start }}

      - name: 결과 커밋 (이 브랜치)
        run: |
          git config user.email "noreply@anthropic.com"
          git config user.name "Claude"
          git add results/overnight_validation.json results/overnight_study.json state/overnight_latest.json
          if [ -z "$(git status --porcelain results/ state/)" ]; then
            echo "결과 변경 없음"; exit 0
          fi
          git commit -m "chore: 종가매매 실데이터 검증 결과 [skip ci]"
          # 세션에서 브랜치가 앞서갔을 수 있으니 rebase 후 재시도 (푸시 경합 방지)
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push 실패 — rebase 후 재시도 ($i)"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            sleep $((2**i))
          done
          echo "::error::결과 push 실패"; exit 1
