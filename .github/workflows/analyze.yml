name: 실데이터 백테스트 & 튜닝

# ⚠️ 임시: 이 브랜치에서 종가매매 '승률 최적화(winrate) + 국면필터' 실데이터 검증을
#    돌리기 위해 잠시 전용합니다. (overnight-validate.yml 이 아직 main 에 없어 직접
#    dispatch 가 안 되므로, main 에 등록된 analyze.yml 을 ref=이브랜치 로 실행.)
#    검증 후 원래(스윙) 내용으로 되돌립니다.
on:
  workflow_dispatch:
    inputs:
      top:
        description: "시총 상위 종목 수"
        default: "150"
      start:
        description: "시작일"
        default: "2019-01-01"
      slippage:
        description: "매수 슬리피지"
        default: "0.001"

permissions:
  contents: write

concurrency:
  group: analyze
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 승률 최적화(winrate) + 국면필터 — 실데이터
        run: >
          python tune_overnight.py --source real --market KOSPI
          --top ${{ inputs.top }} --start ${{ inputs.start }}
          --slippage ${{ inputs.slippage }} --objective winrate --regime
          --out results/overnight_validation.json

      - name: 스캔(국면필터) — 대시보드 갱신
        run: >
          python run_overnight.py --source real --market KOSPI
          --top 200 --start ${{ inputs.start }} --regime

      - name: 결과 커밋 (이 브랜치)
        run: |
          git config user.email "noreply@anthropic.com"
          git config user.name "Claude"
          git add results/overnight_validation.json results/overnight_study.json state/overnight_latest.json
          if [ -z "$(git status --porcelain results/ state/)" ]; then
            echo "결과 변경 없음"; exit 0
          fi
          git commit -m "chore: 종가매매 승률최적화+국면 실데이터 검증 [skip ci]"
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push 실패 — rebase 후 재시도 ($i)"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            sleep $((2**i))
          done
          echo "::error::결과 push 실패"; exit 1
